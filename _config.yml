# ──────────────────────────────────────────────
# 1. SITE METADATA
# ──────────────────────────────────────────────
title: "Taulant Koka"
subtitle: "Data Science Researcher"
name: "Taulant Koka"
description: "Personal site of Taulant Koka — Data Science Researcher and Ph.D. candidate at TU Darmstadt."

url: "https://taulantkoka.com"
baseurl: ""
repository: "taulantkoka/taulantkoka.github.io"

locale: "en-US"

# ──────────────────────────────────────────────
# 2. THEME
# ──────────────────────────────────────────────
# ──────────────────────────────────────────────
# Theme & Skin — MINT = green theme
# ──────────────────────────────────────────────
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "custom"
# Enable breadcrumbs globally (nice UX + SEO)
breadcrumbs: true

# Enable copy button on code blocks
copy_button: true

# ──────────────────────────────────────────────
# 3. AUTHOR
# ──────────────────────────────────────────────
author:
  name: "Taulant Koka"
  bio: "Data Science Researcher · Ph.D. candidate at TU Darmstadt"
  location: "Darmstadt, Germany"
  links: &social_links
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taulantkoka"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/taulant-koka-36a7971b6"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=dbpEvYUAAAAJ&hl=de"


# ──────────────────────────────────────────────
# 4. FOOTER
# ──────────────────────────────────────────────
footer:
  links: *social_links   # reuse (no duplication)

# ──────────────────────────────────────────────
# 5. READING & SEARCH
# ──────────────────────────────────────────────
words_per_minute: 200
search: true
search_full_content: true

# ──────────────────────────────────────────────
# 6. PAGINATION
# ──────────────────────────────────────────────
paginate: 6
paginate_path: /blog/page:num/

# ──────────────────────────────────────────────
# 7. BUILD / PLUGINS
# ──────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-gist

# ──────────────────────────────────────────────
# 8. FILE HANDLING
# ──────────────────────────────────────────────
include:
  - _pages

exclude:
  - README.md
  - LICENSE
  - node_modules
  - vendor

# ──────────────────────────────────────────────
# 9. DEFAULTS
# ──────────────────────────────────────────────
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      mathjax: true   
      kramdown:
        math_engine: mathjax
        syntax_highlighter: rouge
        input: GFM # GitHub Flavored Markdown 
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true

  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      mathjax: true    
      kramdown:
        math_engine: mathjax
        syntax_highlighter: rouge
        input: GFM # GitHub Flavored Markdown 
      author_profile: false

# ──────────────────────────────────────────────
# 10. SEO / SOCIAL
# ──────────────────────────────────────────────
social:
  type: "Person"
  name: "Taulant Koka"
  links:
    - "https://github.com/taulantkoka"
    - "https://linkedin.com/in/taulant-koka-36a7971b6"
    - "https://scholar.google.com/citations?user=dbpEvYUAAAAJ&hl=de"

# Optional but HIGHLY recommended
twitter:
  username: ""   # add if you have one

# Open Graph defaults
og_image: "/assets/images/site-preview.png"
