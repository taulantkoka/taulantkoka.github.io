# ──────────────────────────────────────────────
# Site Settings
# ──────────────────────────────────────────────
title: "Taulant Koka"
subtitle: "Data Researcher"
name: "Taulant Koka"
description: "Personal site of Taulant Koka — Data Researcher based in Germany. Projects, writing, and more."
url: "https://taulantkoka.com"
baseurl: ""
repository: "taulantkoka/taulantkoka.github.io"

# ──────────────────────────────────────────────
# Theme & Skin
# ──────────────────────────────────────────────
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

# ──────────────────────────────────────────────
# Site Author (used in footer now, not sidebar)
# ──────────────────────────────────────────────
author:
  name: "Taulant Koka"
  # avatar: "/assets/images/bio-photo.jpg"
  bio: "Data Researcher based in Germany."
  location: "Germany"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taulantkoka"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/taulant-koka-36a7971b6"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your-email@example.com"

# ──────────────────────────────────────────────
# Footer Links (your social links live here now)
# ──────────────────────────────────────────────
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taulantkoka"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/taulant-koka-36a7971b6"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your-email@example.com"

# ──────────────────────────────────────────────
# Reading & Output
# ──────────────────────────────────────────────
locale: "en-US"
words_per_minute: 200
search: true
search_full_content: true

# ──────────────────────────────────────────────
# Build / Plugins
# ──────────────────────────────────────────────
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-remote-theme

# ──────────────────────────────────────────────
# Pagination (blog)
# ──────────────────────────────────────────────
paginate: 6
paginate_path: /blog/page:num/

# ──────────────────────────────────────────────
# Include / Exclude
# ──────────────────────────────────────────────
include:
  - _pages

# ──────────────────────────────────────────────
# Defaults — author_profile OFF, sidebar nav where needed
# ──────────────────────────────────────────────
defaults:
  # Blog posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

# ──────────────────────────────────────────────
# SEO / Social
# ──────────────────────────────────────────────
og_image: /assets/images/site-og.png
social:
  type: "Person"
  name: "Taulant Koka"
  links:
    - "https://github.com/taulantkoka"
    - "https://linkedin.com/in/taulant-koka-36a7971b6"
