# ──────────────────────────────────────────────
# Site Settings
# ──────────────────────────────────────────────
title: "Taulant Koka"
subtitle: "Data Science Researcher"
name: "Taulant Koka"
description: "Personal site of Taulant Koka — ML Researcher and Ph.D. candidate at TU Darmstadt. Research, projects, and writing."
url: "https://taulantkoka.com"
baseurl: ""
repository: "taulantkoka/taulantkoka.github.io"

# ──────────────────────────────────────────────
# Theme & Skin — MINT = green theme
# ──────────────────────────────────────────────
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "mint"

# ──────────────────────────────────────────────
# Site Author — used for metadata only
# ──────────────────────────────────────────────
author:
  name: "Taulant Koka"
  bio: "ML Researcher · Ph.D. candidate at TU Darmstadt"
  location: "Darmstadt, Germany"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taulantkoka"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/taulant-koka-36a7971b6"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=dbpEvYUAAAAJ&hl=de"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:koka.taulant@outlook.de"

# ──────────────────────────────────────────────
# Footer — social links live here
# ──────────────────────────────────────────────
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taulantkoka"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/taulant-koka-36a7971b6"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=dbpEvYUAAAAJ&hl=de"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:koka.taulant@outlook.de"

# ──────────────────────────────────────────────
# Reading & Output
# ──────────────────────────────────────────────
locale: "en-US"
words_per_minute: 200
search: true
search_full_content: true

# ──────────────────────────────────────────────
# Build / Plugins
# ──────────────────────────────────────────────
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-remote-theme

# ──────────────────────────────────────────────
# Pagination (blog)
# ──────────────────────────────────────────────
paginate: 6
paginate_path: /blog/page:num/

# ──────────────────────────────────────────────
# Include / Exclude
# ──────────────────────────────────────────────
include:
  - _pages

# ──────────────────────────────────────────────
# Defaults — author_profile OFF on all pages
# ──────────────────────────────────────────────
defaults:
  # Blog posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

# ──────────────────────────────────────────────
# SEO / Social
# ──────────────────────────────────────────────
social:
  type: "Person"
  name: "Taulant Koka"
  links:
    - "https://github.com/taulantkoka"
    - "https://linkedin.com/in/taulant-koka-36a7971b6"
    - "https://scholar.google.com/citations?user=dbpEvYUAAAAJ&hl=de"
